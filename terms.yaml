terms:
  data:
    label: Daten
    description: Strukturierte oder unstrukturierte Fakten, Messwerte oder Beobachtungen, die als Grundlage von Entscheidugnen oder Analysen dienen. Grundsätzlich sind drei Arten von Daten (numerische Daten wie  Messwerte, kategoriale Daten wie Beschreibungen und Metadaten (Daten über Daten)) zu unterscheiden.
    slogan: Daten sind eine strategische Ressource des BLW
    related:
      - dataCustodian
      - dataSteward
      - dataOwner

  validation:
    label: Validierung
    description: Prüfung, ob die Bedeutung gemäss fachlicher Termini (Glossar) oder ob die definiterten Qualitätstandards (fit-for-purpuse) eingehalten wurden.
    related:
      - dataCustodian
      - dataSteward
      - dataOwner
      - data

  dataOwner:
    label: 🧑‍✈️🧭 Dateneigner (Data Owner)
    slogan: Der 🧑‍✈️🧭 Dateneigner (Data Owner) trägt die accountability – auch wenn er nicht operativ arbeitet.
    description: Der 🧑‍✈️🧭 Dateneigner (Data Owner) ist Mitglied der Geschäftsleitung und trägt die Gesamtaccountability für die Daten seines Bereichs. Er entscheidet, wofür Daten genutzt werden dürfen, wie wichtig sie sind und welche Risiken akzeptiert werden.
    aliases:
      - Data Owner
    related:
      - dataCustodian
      - dataSteward
    responsibility: 
    - Definiert die strategisch relevanten Daten und priorisiert Dateninitiativen
    - Genehmigt Nutzung, Weitergabe und Veröffentlichung von Daten
    - Initiiert Programme zur Qualitätsverbesserung
    - Stellt Ressourcen (Budget, Personal) bereit
    authority:
    - Priorisierung von Datenprojekten
    - Freigabe kritischer Datennutzungen (z. B. OGD, Datenaustausch)
    - Festlegung von Schutzbedarf und Risikoniveau
    - Eskalationsentscheid bei Konflikten
    accountability:
    - Rechtliche Compliance sicherstellen (z. B. Datenschutz, Fachgesetze)
    - description Schutzbedarf und Risikomitigierung der Daten
    - Sicherstellen, dass Daten zur Zielerreichung des BLW beitragen
    focus: Führungsaccountability tragen
    expertise: Strategisch

  dataCustodian:
    label: 🕵🏻⚙️ Datenhalter (Data Custodian)
    description: Der 🕵🏻⚙️ Datenhalter (Data Custodian) ist im nnformatiknahen Bereich angesiedelt und stellt sicher, dass Daten technisch verfügbar, sicher und performant sind. Wo die 🕵🏻⚙️ Datenhalter (Data Custodian) angesiedelt sind, hängt von den jeweiligen Daten ab. Diese können im Amt, in der Bundesverwaltung, bei den Kantonen oder auch bei privaten Anbietern gehalten werden.
    slogan: Der 🕵🏻⚙️ Datenhalter (Data Custodian) sorgt dafür, dass Daten sicher und zuverlässig gespeichert und extrahiert werden.
    aliases:
      - Data Custodian
    related:
      - dataOwner
      - dataSteward
    responsibility:
    - Betrieb von:
      - Datenbanken
      - Schnittstellen
    - Infrastruktur (On-Prem / Cloud)
    - Umsetzung von:
      - Zugriffskontrollen
      - Verschlüsselung
    - Backup & Recovery
    - Monitoring und Performance-Optimierung
    - Incident Management (z. B. Sicherheitsvorfälle)
    authority:
    - Technische Umsetzung von Sicherheits- und Betriebsmassnahmen
    - Sofortmassnahmen bei Sicherheitsvorfällen
    - Optimierung der Infrastruktur
    accountability:
    - Verfügbarkeit
    - Integrität
    - Sicherheit (Confidentiality)
    - Nachvollziehbarkeit (Logging, Traceability)
    focus: Technische Expertise einbringen.
    expertise: Teschnisch

  dataSteward:
    label: 👩‍💼💡 Datenverwalter (Data Steward)
    description: Der 👩‍💼💡 Datenverwalter (Data Steward) ist im Fachbereich angesiedelt und stellt sicher, dass Daten verständlich, korrekt und nutzbar sind. Er ist die zentrale Drehscheibe zwischen Fach, IT und Governance.
    slogan: Der 👩‍💼💡 Datenverwalter (Data Steward) sorgt dafür, dass Daten richtig verstanden und richtig genutzt werden.
    aliases:
      - Data Steward
    related:
      - dataCustodian
      - dataOwner
    responsibility:
      - Definiert gemeinsam mit Fachbereichen:
        - Datenanforderungen
        - Qualitätskriterien
      - Pflegt:
        - Metadaten (Data Catalog)
        - Business Glossary
      - Überwacht und verbessert die Datenqualität
      - Koordiniert die Bereitstellung von Daten (inkl. OGD)
      - Analysiert und behebt Qualitätsprobleme (möglichst an der Quelle)
    authority:
      - Korrigiert operative Datenfehler
      - Definiert Qualitätsregeln und Standards (mit Unterstützung)
      - Entscheidet über kleinere Anpassungen in Prozessen
    accountability:
      - Datenqualität (Accuracy, Completeness, Consistency)
      - Dokumentation & Transparenz
      - Semantische Klarheit (einheitliche Begriffe)
      - Einhaltung der Governance im Alltag
    focus: Fachanforderungen sicherstellen.
    expertise: Fachlich

  test:
    label: Test
    description: This is a testcase
    related:
      - dataCustodian
      - dataSteward
      - dataOwner
  
  gdg:
    label: Gremium Datengouvernanz (GDG) 👥🧭 / ACB
    description: Das Gremium Datengouvernanz (DGD) ist das zentrale, bereichsübergreifende Entscheidungs- und Koordinationsgremium für Datenfragen. Die Mitglieder sind mandatiert und ihre Entscheidungen sind verbindlich.
    responsibility: Entscheidet und koordiniert bei Konflikten zwischen 🧑‍✈️🧭 Dateneigner (Data Owner).
    authority: Entscheidet bei Konflikten zwischen 🧑‍✈️🧭 Dateneigner (Data Owner) bei der Priorisierung von datenbezogenen Initiativen und Standardisierung und Harmonisierung von Daten.
    accountability: Sorgt für eine Abstimmung zwischen Digitalisierungsstrategie BLW und Umsetzung der BLW Datengouvernanz, koordiniert die Umsetzungsinitiativen und löst Konflikte bei der Standardisierung und Harmonisierung von Daten.

  bod:
    label: Geschäftsleitung
    description: Die Geschäftsleitung ist die oberste Entscheidungsinstanz für strategische und strukturelle Datenkonflikte. Die Geschäftsleitung entscheidet entlang der Organisationsstrategie – nicht entlang bestehender Strukturen.

  dataManagementLead:
    label: Data Management Lead 👤🧭
    description: Kompetenzstelle Daten und operative “Geschäftsstelle” für das DGD.
    responsibility: 
      - Operative Koordination der Data Governance 
      - Vorbereitung von Entscheidungen DGD
      - Tracking der Reifegradentwicklung
    authority: None
    accountability: 
      - Meetings vorbereiten und dokumentieren
      - Enabling der 👩‍💼💡 Datenverwalter (Data Stewards)
    aliases: Data Management Specialist 👤⚙️



  dataArchitect:
    label: Datenarchitekt 👤⚙️
    description: Data Architect  👤📐 ist für die Festlegung der Richtlinien, Verfahren, Modelle und Technologien verantwortlich, die beim Sammeln, Organisieren, Speichern und Zugreifen auf die BLW-Daten verwendet werden sollen. 
    responsibility: 
    - Definiert Datenmodelle, Standards, Interoperabilität
    - Konzeption und Verwaltung der Dateninfrastruktur eines Unternehmens
    - Entwicklung von Datenrichtlinien und -standards, die auf die Geschäftsziele und technologischen Möglichkeiten abgestimmt sind
    authority: Entscheidet über die Auswahl geeigneter Datenbanktechnologien, Architekturansätze und Integrationsstrategien, um eine effiziente und skalierbare Datenlandschaft sicherzustellen. Zudem entscheidet er über Standards, Richtlinien und Governance-Strukturen, die den Umgang mit Daten im Unternehmen regeln und langfristig Qualität sowie Sicherheit gewährleisten.
    accountability: Plant eine skalierbare und sichere Datenarchitektur, die den Anforderungen des BLW entspricht. Stellt sicher, dass Daten konsistent, verfügbar und qualitativ hochwertig sind sowie den geltenden Datenschutz- und Compliance-Vorgaben entsprechen.

  complianceOfficer:
    label: Datenschutzberater 👤⚖️
    description: Der Datenschutzberater 👤 ⚖️ stellt die Einhaltung rechtlichen Vorgaben bei der Bearbeitung von Personendaten sicher. 
    responsibility:
    - Prüft die Bearbeitung von Personendaten und empfiehlt Korrekturmassnahmen
    - Anlaufstelle bei Datenschutzfragen
    - Prüft Anfragen gemäss Informationsgesetz.
    authority: Entscheidet über die Auslegung und Anwendung des Datenschutzrechts (insbesondere des Bundesgesetz über den Datenschutz (DSG)) in konkreten Fällen und gibt verbindliche Empfehlungen oder Stellungnahmen zu Datenbearbeitungen ab. Zudem beurteilt er Risiken, genehmigt bzw. fordert Anpassungen bei Projekten mit Personendaten und kann Massnahmen anordnen oder empfehlen, um die Einhaltung von Datenschutz und Datensicherheit sicherzustellen.
    accountability: Beratung von Lösungsarchitekten.

  informationSecurityOfficer:
    label: ISBO (Informationssicherheitsbeauftragter der Organisation) 👤⚠️ 
    description: Der ISBO (Informationssicherheitsbeauftragter der Organisation) 👤⚠️ stellt sicher, dass die Vorgaben der Informationssicherheit eingehalten werden.
    responsibility:
    - Prüft die Speicherungskriterien von Daten und empfiehlt Korrekturmassnahmen.
    - Kontrolliert deren Einhaltung.
    - Anlaufstelle bei Fragen der Informationssicherheit.
    authority: Entscheidet über Sicherheitsmassnahmen, Standards und Richtlinien innerhalb der Organisation, und legt fest, wie Risiken angemessen behandelt werden. Zudem beurteilt er Sicherheitsrisiken bei Projekten und Systemen, priorisiert Schutzmassnahmen und gibt verbindliche Vorgaben oder Empfehlungen zur Gewährleistung der Informationssicherheit im Amt.
    accountability: Beratung von Lösungsarchitekten.

  dataUser:
    label: Data User 👤⁉️
    description: Ein Data User ⁉️  will Daten des BLW für eine Projekte verwenden. Der Data User 👤⁉️  kann innerhalb oder ausserhalb des BLW arbeiten. Er/sie kann die Daten aber auch für private Projekte verwenden wollen. 
    responsibility: None
    authority: 
    - Daten verwenden oder nicht?
    - Spezifische Anforderungen an den  👩‍💼💡 Datenverwalter (Data Steward) melden.
    - Antrag für die Veröffentlichung zusätzlicher Daten gemäss EMBAG sicherstellen.
    accountability:
    - Eigene Auswertungen nach besten Wissen und Gewissen erstellen. 
    - Publikationsrichtlinien (Zitierung!) umsetzen.